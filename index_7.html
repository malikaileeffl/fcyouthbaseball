<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FC Youth Baseball | Southern Indiana</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --blue: #0078ab;
      --blue-dark: #005a82;
      --blue-light: #0099d6;
      --white: #ffffff;
      --black: #000000;
      --gray: #f4f6f8;
      --gray-mid: #cccccc;
      --text: #1a1a1a;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Barlow', sans-serif;
      color: var(--text);
      background: var(--white);
      overflow-x: hidden;
    }

    /* ── NAV ── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      background: rgba(0,0,0,0.92);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 40px;
      height: 70px;
      border-bottom: 2px solid var(--blue);
    }

    .nav-logo {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
    }

    .nav-logo img {
      height: 48px;
      width: 48px;
      object-fit: contain;
    }

    .nav-logo span {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 1.1rem;
      color: var(--white);
      letter-spacing: 0.04em;
      line-height: 1.2;
    }

    .nav-links {
      display: flex;
      gap: 32px;
      list-style: none;
    }

    .nav-links a {
      color: var(--gray-mid);
      text-decoration: none;
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 600;
      font-size: 0.95rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      transition: color 0.2s;
    }

    .nav-links a:hover { color: var(--blue-light); }

    .nav-cta {
      background: var(--blue);
      color: var(--white) !important;
      padding: 8px 20px;
      border-radius: 4px;
      transition: background 0.2s !important;
    }

    .nav-cta:hover { background: var(--blue-light) !important; color: var(--white) !important; }

    /* hamburger */
    .hamburger {
      display: none;
      flex-direction: column;
      gap: 5px;
      cursor: pointer;
      background: none;
      border: none;
      padding: 4px;
    }
    .hamburger span {
      display: block;
      width: 24px;
      height: 2px;
      background: var(--white);
      transition: all 0.3s;
    }

    /* ── HERO ── */
    #home {
      min-height: 100vh;
      background: var(--black);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 120px 24px 80px;
      position: relative;
      overflow: hidden;
    }

    #home::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% 60%, rgba(0,120,171,0.18) 0%, transparent 70%);
      pointer-events: none;
    }

    /* diagonal stripe accent */
    #home::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 0; right: 0;
      height: 80px;
      background: var(--white);
      clip-path: polygon(0 100%, 100% 0, 100% 100%);
    }

    .hero-logo {
      width: 140px;
      height: 140px;
      object-fit: contain;
      margin-bottom: 28px;
      animation: fadeDown 0.8s ease both;
      filter: drop-shadow(0 0 24px rgba(0,120,171,0.5));
    }

    .hero-eyebrow {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 600;
      font-size: 0.85rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--blue-light);
      margin-bottom: 16px;
      animation: fadeDown 0.8s 0.1s ease both;
    }

    .hero-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 900;
      font-size: clamp(3rem, 8vw, 6rem);
      line-height: 0.95;
      color: var(--white);
      text-transform: uppercase;
      letter-spacing: 0.02em;
      margin-bottom: 8px;
      animation: fadeDown 0.8s 0.2s ease both;
    }

    .hero-title span { color: var(--blue-light); }

    .hero-sub {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 600;
      font-size: clamp(1.1rem, 3vw, 1.6rem);
      color: var(--gray-mid);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 28px;
      animation: fadeDown 0.8s 0.3s ease both;
    }

    .hero-tagline {
      font-size: 1.1rem;
      color: rgba(255,255,255,0.75);
      max-width: 520px;
      line-height: 1.6;
      margin-bottom: 40px;
      animation: fadeDown 0.8s 0.4s ease both;
    }

    .hero-buttons {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: center;
      animation: fadeDown 0.8s 0.5s ease both;
    }

    .btn {
      display: inline-block;
      padding: 14px 32px;
      border-radius: 4px;
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 1rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      text-decoration: none;
      transition: all 0.2s;
      cursor: pointer;
      border: none;
    }

    .btn-primary {
      background: var(--blue);
      color: var(--white);
    }
    .btn-primary:hover { background: var(--blue-light); transform: translateY(-2px); }

    .btn-outline {
      background: transparent;
      color: var(--white);
      border: 2px solid rgba(255,255,255,0.4);
    }
    .btn-outline:hover { border-color: var(--white); transform: translateY(-2px); }

    /* ── SECTIONS SHARED ── */
    section { padding: 90px 24px; }

    .container { max-width: 1100px; margin: 0 auto; }

    .section-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 600;
      font-size: 0.8rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--blue);
      margin-bottom: 12px;
    }

    .section-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 900;
      font-size: clamp(2rem, 5vw, 3.2rem);
      line-height: 1;
      text-transform: uppercase;
      color: var(--black);
      margin-bottom: 20px;
    }

    .section-title span { color: var(--blue); }

    /* ── MISSION ── */
    #mission { background: var(--white); }

    .mission-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 60px;
      align-items: center;
    }

    .mission-text p {
      font-size: 1.05rem;
      line-height: 1.75;
      color: #444;
      margin-bottom: 16px;
    }

    .mission-text p:last-child { margin-bottom: 0; }

    .mission-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .stat-card {
      background: var(--black);
      padding: 28px 24px;
      border-radius: 6px;
      border-left: 4px solid var(--blue);
      text-align: center;
    }

    .stat-num {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 900;
      font-size: 2.8rem;
      color: var(--blue-light);
      line-height: 1;
      margin-bottom: 6px;
    }

    .stat-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 600;
      font-size: 0.85rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--gray-mid);
    }

    /* ── ABOUT ── */
    #about {
      background: var(--gray);
      position: relative;
      overflow: hidden;
    }

    #about .grid-bg {
      position: absolute;
      inset: -50%;
      width: 200%;
      height: 200%;
      background-image:
        linear-gradient(rgba(0,0,0,0.07) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,0,0,0.07) 1px, transparent 1px);
      background-size: 80px 80px;
      will-change: transform;
      pointer-events: none;
    }

    #about .container { position: relative; z-index: 1; }

    .about-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 60px;
      align-items: center;
    }

    .about-img-placeholder {
      background: var(--black);
      border-radius: 8px;
      aspect-ratio: 4/5;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      border: 2px dashed rgba(0,120,171,0.4);
    }

    .about-img-placeholder img {
      width: 80px;
      opacity: 0.5;
    }

    .about-img-placeholder p {
      color: rgba(255,255,255,0.4);
      font-size: 0.85rem;
      font-family: 'Barlow Condensed', sans-serif;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .about-text p {
      font-size: 1.05rem;
      line-height: 1.75;
      color: #444;
      margin-bottom: 16px;
    }

    .about-text p:last-child { margin-bottom: 0; }

    /* ── DONATE ── */
    #donate {
      background: var(--black);
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    #donate::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% 50%, rgba(0,120,171,0.15) 0%, transparent 65%);
      pointer-events: none;
    }

    #donate .section-title { color: var(--white); }
    #donate .section-label { color: var(--blue-light); }

    .donate-desc {
      font-size: 1.1rem;
      color: rgba(255,255,255,0.7);
      max-width: 560px;
      margin: 0 auto 40px;
      line-height: 1.7;
    }

    .donate-placeholder {
      display: inline-block;
      background: rgba(0,120,171,0.15);
      border: 2px dashed rgba(0,120,171,0.5);
      color: rgba(255,255,255,0.5);
      padding: 20px 40px;
      border-radius: 6px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.9rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 24px;
    }

    /* ── SIGN UP ── */
    #signup { background: var(--white); }

    .signup-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 60px;
      align-items: start;
    }

    .signup-intro p {
      font-size: 1.05rem;
      line-height: 1.75;
      color: #444;
      margin-bottom: 16px;
    }

    .form-group {
      margin-bottom: 18px;
    }

    .form-group label {
      display: block;
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 600;
      font-size: 0.85rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--black);
      margin-bottom: 6px;
    }

    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 4px;
      font-family: 'Barlow', sans-serif;
      font-size: 1rem;
      color: var(--text);
      background: var(--white);
      transition: border-color 0.2s;
      outline: none;
    }

    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      border-color: var(--blue);
    }

    .form-group textarea { resize: vertical; min-height: 100px; }

    .form-submit {
      width: 100%;
      padding: 16px;
      background: var(--blue);
      color: var(--white);
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 1.1rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.2s, transform 0.2s;
    }

    .form-submit:hover { background: var(--blue-light); transform: translateY(-2px); }

    /* success message */
    .form-success {
      display: none;
      background: #e6f7ed;
      border: 2px solid #4caf50;
      color: #2e7d32;
      padding: 16px;
      border-radius: 4px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1rem;
      letter-spacing: 0.05em;
      text-align: center;
      margin-top: 12px;
    }

    /* ── CONTACT ── */
    #contact { background: var(--gray); }

    .contact-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 60px;
      align-items: start;
    }

    .contact-info { }

    .contact-item {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 28px;
    }

    .contact-icon {
      width: 44px;
      height: 44px;
      background: var(--blue);
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .contact-icon svg { width: 20px; height: 20px; fill: var(--white); }

    .contact-detail h4 {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 0.85rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--black);
      margin-bottom: 4px;
    }

    .contact-detail p, .contact-detail a {
      font-size: 1rem;
      color: #555;
      text-decoration: none;
      line-height: 1.5;
    }

    .contact-detail a:hover { color: var(--blue); }

    .contact-form .form-group input,
    .contact-form .form-group textarea {
      background: var(--white);
    }

    /* ── FOOTER ── */
    footer {
      background: var(--black);
      border-top: 2px solid var(--blue);
      padding: 40px 24px;
      text-align: center;
    }

    .footer-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 16px;
    }

    .footer-logo img { height: 44px; }

    .footer-logo span {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 1rem;
      color: var(--white);
      letter-spacing: 0.05em;
    }

    .footer-links {
      display: flex;
      gap: 24px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 20px;
      list-style: none;
    }

    .footer-links a {
      color: var(--gray-mid);
      text-decoration: none;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.85rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      transition: color 0.2s;
    }

    .footer-links a:hover { color: var(--blue-light); }

    .footer-copy {
      color: rgba(255,255,255,0.3);
      font-size: 0.8rem;
      letter-spacing: 0.05em;
    }
